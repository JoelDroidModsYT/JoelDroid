<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando JoelDroid Mods...</title>
  <script>
    (function(){
      try {
        var host = window.location.hostname; // Lee: globaltruckonline.joeldroidmods.com
        var rootDomain = 'https://joeldroidmods.com';
        
        // Extraemos lo que está antes del primer punto
        var parts = host.split('.');
        var gameID = '';

        if(parts.length >= 3 && parts[0] !== 'www') {
          gameID = parts[0]; // Captura "globaltruckonline"
        }

        if(gameID) {
          // Te redirige a la web principal con el ID del juego
          window.location.replace(rootDomain + '/?id=' + encodeURIComponent(gameID));
        } else {
          // Si entran directo al dominio, va al inicio
          window.location.replace(rootDomain + '/');
        }
      } catch(e) {
        window.location.replace('https://joeldroidmods.com/');
      }
    })();
  </script>
  <style>
    body {
      margin: 0; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #020408; color: #00ff9d;
      font-family: 'Segoe UI', sans-serif; flex-direction: column; gap: 20px;
    }
    .loader {
      width: 45px; height: 45px;
      border: 5px solid rgba(0, 255, 157, 0.1);
      border-top-color: #00ff9d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p>Iniciando Mod Seguro...</p>
</body>
</html>
