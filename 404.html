<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirigiendo...</title>
  <!--
    ══════════════════════════════════════════════════════════════════
    404.html — JoelDroid Mods YT
    ══════════════════════════════════════════════════════════════════
    Este archivo lo sirve GitHub Pages cuando alguien visita un
    subdominio wildcard como:
      https://global-truck-online-mod.joeldroidmods.com

    Lo que hace:
      1. Lee el subdominio (ej: "global-truck-online-mod")
      2. Redirige a joeldroidmods.com/?id=global-truck-online-mod
      3. El index.html detecta ?id= y abre el juego automáticamente

    IMPORTANTE: Este 404.html debe estar en la raíz del repositorio
    de GitHub Pages configurado para joeldroidmods.com
    ══════════════════════════════════════════════════════════════════
  -->
  <script>
    (function(){
      try {
        var host = window.location.hostname;
        // Extraer subdominio: "global-truck-online-mod" de "global-truck-online-mod.joeldroidmods.com"
        var parts = host.split('.');
        var subdomain = '';
        if(parts.length >= 3){
          // Todo antes del dominio raíz (joeldroidmods.com)
          subdomain = parts.slice(0, parts.length - 2).join('-');
        }

        // Dominio raíz destino (tu GitHub Pages principal)
        var rootDomain = 'https://joeldroidmods.com';

        if(subdomain && subdomain !== 'www'){
          // Redirigir preservando el subdominio como ?id=
          window.location.replace(rootDomain + '/?id=' + encodeURIComponent(subdomain));
        } else {
          // Sin subdominio reconocible → ir al home
          window.location.replace(rootDomain + '/');
        }
      } catch(e) {
        window.location.replace('https://joeldroidmods.com/');
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #020408;
      color: #fff;
      font-family: 'Inter', sans-serif;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(59,130,246,.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 13px; opacity: .5; font-weight: 600; letter-spacing: .05em; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Cargando JoelDroid Mods...</p>
</body>
</html>
