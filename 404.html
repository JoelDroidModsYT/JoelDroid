<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoelDroid Mods YT</title>
  <!-- GitHub Pages SPA redirect — convierte /download/?id=X a /?id=X&_path=download -->
  <script>
    // Técnica estándar para SPAs en GitHub Pages con dominio personalizado
    // Preserva la ruta y query string, redirige al index raíz
    (function() {
      var seg = 0; // 0 = dominio raíz (joeldroidmods.com)
      var l = window.location;
      var path = l.pathname.slice(1).split('/').slice(seg).join('/').replace(/\/$/, '') || '';
      var query = l.search.slice(1);
      var hash = l.hash.slice(1);
      
      // Construir la URL de redirección preservando todos los parámetros
      var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
      redirect += '/?';
      if (path) redirect += 'p=' + encodeURIComponent(path);
      if (query) redirect += (path ? '&' : '') + query;
      if (hash) redirect += '#' + hash;
      
      sessionStorage.setItem('jd_redirect_path', path || '');
      sessionStorage.setItem('jd_redirect_query', query || '');
      window.location.replace(redirect);
    })();
  </script>
</head>
<body>
  <style>
    body { background: #0c1425; color: #fff; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; height: 100vh;
      margin: 0; }
    .msg { text-align: center; opacity: .6; }
    .msg h1 { font-size: 2rem; font-weight: 900; }
    .msg p { font-size: .9rem; margin-top: .5rem; }
  </style>
  <div class="msg">
    <h1>⚡ JoelDroid</h1>
    <p>Redirigiendo...</p>
  </div>
</body>
</html>
