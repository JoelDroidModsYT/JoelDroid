<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoelDroid Mods</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#020408;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      font-family:'Inter',system-ui,sans-serif;
      gap:20px;
    }
    .ring{
      width:48px;height:48px;
      border-radius:50%;
      border:3px solid rgba(0,255,157,.15);
      border-top-color:#00ff9d;
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .logo{
      font-size:11px;font-weight:800;letter-spacing:.25em;
      text-transform:uppercase;color:rgba(0,255,157,.5);
    }
    .msg{
      font-size:10px;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;color:rgba(255,255,255,.2);
    }
  </style>
</head>
<body>
  <div class="ring"></div>
  <span class="logo">JoelDroid Mods</span>
  <span class="msg">Cargando...</span>

  <script>
    (function(){
      // ── Protección anti-bucle ─────────────────────────────────────
      // Si ya venimos de una redirección (param __r=1), no redirigir de nuevo.
      if(window.location.search.indexOf('__r=1') !== -1) return;

      var host = window.location.hostname; // ej: "globaltruckonline.joeldroidmods.com"
      var ROOT = 'joeldroidmods.com';

      // Extraer solo la primera etiqueta antes del dominio raíz
      // "globaltruckonline.joeldroidmods.com" → "globaltruckonline"
      var sub = '';
      if(host !== ROOT && host !== 'www.' + ROOT){
        var dot = host.indexOf('.');
        if(dot > 0) sub = host.substring(0, dot);
      }

      // Solo redirigir si hay un subdominio real y no vacío
      if(sub){
        window.location.replace(
          'https://' + ROOT + '/?id=' + encodeURIComponent(sub) + '&__r=1'
        );
      }
      // Sin subdominio → no hacer nada (evita bucle en el dominio raíz)
    })();
  </script>
</body>
</html>
