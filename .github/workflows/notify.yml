name: JoelDroid VIP — Firebase Notify

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Pon aquí tu URL de Firebase que termina en .json
          FIREBASE_URL: "https://TU-PROYECTO.firebaseio.com/juegos.json"
        run: |
          # 1. Obtenemos el nombre del último juego desde tu Firebase
          GAME_NAME=$(curl -s $FIREBASE_URL | jq -r 'keys_unsorted | last')
          
          # 2. Enviamos el aviso a Telegram
          curl -s -X POST https://api.telegram.org/bot$TOKEN/sendMessage \
          -d chat_id=$CHAT_ID \
          -d text="¡JoelDroid VIP! Nueva actualización detectada en Firebase: $GAME_NAME"
