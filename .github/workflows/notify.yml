name: JoelDroid VIP — Telegram Notify

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Versión actualizada

      - name: Set up Python
        uses: actions/setup-python@v5 # Versión actualizada
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_bot.py
