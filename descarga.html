/* ── CACHÉ DE IMÁGENES: guarda iconos en Cache API para carga instantánea ── */
(function(){
  var CACHE_NAME = 'jd-img-cache-v1';
  window._jdCacheImg = function(url) {
    if (!url || typeof caches === 'undefined') return;
    caches.open(CACHE_NAME).then(function(c) {
      c.match(url).then(function(r) { if (!r) c.add(url).catch(function(){}); });
    }).catch(function(){});
  };
  window._jdGetCachedImg = function(url, imgEl, phEl) {
    if (!url) return;
    if (typeof caches !== 'undefined') {
      caches.open(CACHE_NAME).then(function(c) {
        c.match(url).then(function(r) {
          if (r) {
            r.blob().then(function(b) {
              var objUrl = URL.createObjectURL(b);
              if (imgEl) { imgEl.src = objUrl; imgEl.onload = function(){ imgEl.style.display=''; if(phEl) phEl.style.display='none'; URL.revokeObjectURL(objUrl); }; imgEl.onerror = function(){ imgEl.src=url; }; }
            });
          } else {
            if (imgEl) { imgEl.src = url; imgEl.onload=function(){ imgEl.style.display=''; if(phEl) phEl.style.display='none'; window._jdCacheImg(url); }; imgEl.onerror=function(){ imgEl.style.display='none'; if(phEl) phEl.style.display='flex'; }; }
          }
        });
      }).catch(function(){ if (imgEl) { imgEl.src=url; imgEl.onload=function(){imgEl.style.display=''; if(phEl) phEl.style.display='none';}; } });
    } else {
      if (imgEl) { imgEl.src=url; imgEl.onload=function(){imgEl.style.display=''; if(phEl) phEl.style.display='none';}; imgEl.onerror=function(){imgEl.style.display='none'; if(phEl) phEl.style.display='flex';}; }
    }
  };
})();

(function () {

  var FB_CFG = {
    apiKey:            'AIzaSyD1-2HWci10K1klI7AqS-t1D0LfI_0FV9M',
    authDomain:        'joeldroid-mods.firebaseapp.com',
    projectId:         'joeldroid-mods',
    storageBucket:     'joeldroid-mods.firebasestorage.app',

  };

  var params  = new URLSearchParams(window.location.search);
  var gameId  = (params.get('id')   || '').trim();
  var modoNum = params.get('modo') === '2' ? 2 : 1;

  /* URL DINÁMICA de Cuty.io obtenida de Firestore (nunca fija) */
  var realUrl      = '';
  var timerRunning = false;
  var timerDone    = false;
  var SERVER_READY_SECS = 12;   // 1er temporizador (asimétrico: 12s)
  var CIRCUM = 238.8;

  /* Handles globales para limpiar SIEMPRE al cambiar de estado */
  var serverReadyIv   = null;   // contador inicial 10s
  var fileScannerIv = null;   // contador verificación 7s
  var fileScannerRaf= null;   // rAF barra
  var securityCheckTs = 0;

  function _clearServerReady(){ if (serverReadyIv){ clearInterval(serverReadyIv); serverReadyIv = null; } }
  function _clearFileScanner(){
    if (fileScannerIv){ clearInterval(fileScannerIv); fileScannerIv = null; }
    if (fileScannerRaf){ cancelAnimationFrame(fileScannerRaf); fileScannerRaf = null; }
  }

  document.addEventListener('DOMContentLoaded', function () {

    var numEl    = document.getElementById('dl-counter-num');
    var ringFg   = document.getElementById('dl-ring-fg');
    var barEl    = document.getElementById('dl-progress-bar');
    var pctEl    = document.getElementById('dl-progress-pct');
    var waitTxt  = document.getElementById('dl-waiting-text');
    var ringWrap = document.getElementById('dl-ring-wrap');
    var btnFinal = document.getElementById('dl-btn-final');
    var nameEl   = document.getElementById('dl-page-name');
    var iconEl   = document.getElementById('dl-page-icon');
    var iconPh   = document.getElementById('dl-icon-ph');
    var statVer  = document.getElementById('dl-stat-ver');
    var statSize = document.getElementById('dl-stat-size');
    var btnTexto = document.getElementById('dl-btn-final-texto');
    var btnBadge = document.getElementById('dl-btn-size-badge');

    if (ringFg) ringFg.style.strokeDashoffset = String(CIRCUM);

    function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function _cleanVer(v) { return String(v||'').replace(/^v+/i,''); }
    function _cleanApk(name){ return String(name||'').replace(/\.apk$/i,'').trim(); }

    /* ── Features del MOD: soporta múltiples nombres de campo Firestore ── */
    function _getFeats(d){
      if (!d) return [];
      var f = d.modFeatures || d.features || d.caracteristicas || d.mod || d.modText;
      if (typeof f === 'string') {
        var s = f.trim();
        if (!s) return [];
        // Intenta JSON, si no, separa por / , | o saltos de línea
        try {
          var j = JSON.parse(s);
          if (Array.isArray(j)) f = j;
          else f = [s];
        } catch(e){
          f = s.split(/\s*[\/|,\n]+\s*/);
        }
      }
      if (!Array.isArray(f)) f = [];
      f = f.map(function(x){ return String(x||'').trim(); })
           .filter(function(x){ return x && !/^moneda\s*0$/i.test(x) && x !== '0'; });
      return f.slice(0, 3);
    }
    function _modTxt(feats){
      return (feats && feats.length) ? feats.join(' / ') : 'Dinero Infinito';
    }

    function _buildHeroTitle(n, v, feats) {
      var vc = _cleanVer(v);
      return '<strong class="dl-hero-name-strong" style="opacity:1;transition:opacity .2s">' + _esc(n) + '</strong>' +
             '<span class="dl-hero-name-sub">Mod: ' + _esc(_modTxt(feats)) + (vc ? ' • Versión '+_esc(vc) : '') + '</span>';
    }
    function _buildBtnHTML(n, v, feats) {
      var vc = _cleanVer(v);
      return '<span class="dl-btn-name-line">' + _esc(n) + (vc?' v'+_esc(vc)+'.Apk':'.Apk') + '</span>' +
             '<span class="dl-btn-mod-line">Mod ' + _esc(_modTxt(feats)) + '</span>';
    }

    /* ─────────────── TIMER INICIAL 10s (con Date.now para no congelarse) ─────────────── */
    var serverReadyTs = 0;

    function _renderTimer(left) {
      var ratio = Math.min((SERVER_READY_SECS - left) / SERVER_READY_SECS, 1);
      if (numEl) numEl.textContent = String(Math.max(left, 0));
      if (ringFg) ringFg.style.strokeDashoffset = String(CIRCUM - CIRCUM * ratio);
      var pct = Math.round(ratio * 100);
      if (barEl) barEl.style.width = pct + '%';
      if (pctEl) pctEl.textContent = pct + '%';
    }

    function _tickServerReady(){
      var left = Math.ceil((serverReadyTs - Date.now()) / 1000);
      if (left <= 0){
        _clearServerReady();
        _renderTimer(0);
        _finishServerReady();
      } else {
        _renderTimer(left);
      }
    }

    function _finishServerReady() {
      timerDone = true;
      if (waitTxt)  waitTxt.style.display  = 'none';
      if (ringWrap) ringWrap.style.display = 'none';
      if (btnFinal) {
        if (realUrl) btnFinal.setAttribute('data-real-url', realUrl);
        btnFinal.classList.add('visible');
      }
      _renderActivador();
    }

    function _startServerReady() {
      if (timerRunning) return;
      timerRunning = true;
      serverReadyTs = Date.now() + SERVER_READY_SECS * 1000;
      _renderTimer(SERVER_READY_SECS);
      _clearServerReady();
      serverReadyIv = setInterval(_tickServerReady, 250);
    }

    /* ─────────────── DATOS DEL JUEGO ─────────────── */
    function _applyData(d) {
      var n = d.name  || d.nombre  || 'MOD APK';
      var v = d.ver   || d.version || '';
      var s = d.size  || d.peso    || '';
      var t = d.thumb || d.imagen  || d.icon || '';

      // URL DINÁMICA de Cuty.io (link acortado guardado por juego en Firestore).
      var url = modoNum === 2
        ? (d.cutyUrl2 || d.cuty2 || d.downloadButtonLink2 || d.link2 || d.cutyUrl || d.downloadButtonLink1 || d.link1 || '')
        : (d.cutyUrl  || d.cuty  || d.downloadButtonLink1 || d.link1 || '');
      realUrl = url || '';
      if (btnFinal && realUrl) btnFinal.setAttribute('data-real-url', realUrl);

      var feats = _getFeats(d);
      if (nameEl)  nameEl.innerHTML    = _buildHeroTitle(n, v, feats);
      if (btnTexto && btnState === 'idle') btnTexto.innerHTML = _buildBtnHTML(n, v, feats);
      if (btnBadge && s) btnBadge.textContent = s;
      try { window._jdMeta = { name:n, ver:v, size:s, feats:feats }; } catch(_e){}
      if (statVer  && v) statVer.textContent  = v;
      if (statSize && s) statSize.textContent = s;
      try {
        var _vc=_cleanVer(v), _mt=_modTxt(feats);
        document.title = n + ' (Mod ' + _mt + ') ' + (_vc ? 'v'+_vc+'.Apk' : '.Apk') + ' | JoelDroid Mods YT';
      } catch(e) {}

      if (t && iconEl) {
        if (window._jdGetCachedImg) {
          window._jdGetCachedImg(t, iconEl, iconPh);
          window._jdCacheImg && window._jdCacheImg(t);
        } else {
          iconEl.onload  = function(){ iconEl.style.display=''; if(iconPh) iconPh.style.display='none'; };
          iconEl.onerror = function(){ iconEl.style.display='none'; if(iconPh) iconPh.style.display='flex'; };
          iconEl.src = t;
        }
      } else if (!t) {
        if (iconEl) iconEl.style.display = 'none';
        if (iconPh) iconPh.style.display = 'flex';
      }
    }

    function _trySessionStorage() {
      try {
        var raw = sessionStorage.getItem('jd_dl_payload')
               || localStorage.getItem('jd_dl_payload')
               || localStorage.getItem('jd_dl_payload_bk');
        if (!raw) return false;
        var p = JSON.parse(raw);
        if (String(p.id) !== String(gameId)) return false;
        if (Date.now() - (p.ts || 0) > 300000) return false;
        _applyData(p); return true;
      } catch(e) { return false; }
    }

    function _fetchFirebase() {
      try {
        if (!firebase.apps.length) firebase.initializeApp(FB_CFG);
        firebase.firestore().collection('mods').doc(String(gameId)).onSnapshot(
          function(doc) { if (doc.exists) { var d = doc.data(); d.id = doc.id; _applyData(d); } if (!timerRunning) _startServerReady(); },
          function(err) { console.warn('[descarga] Firestore:', err.message); if (!timerRunning) _startServerReady(); }
        );
      } catch(e) { console.warn('[descarga] Firebase:', e.message); if (!timerRunning) _startServerReady(); }
    }

    /* ─────────────── RECOMENDADOS (sin cambios) ─────────────── */
    function _slugifyReco(text) {
      return String(text||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,90);
    }
    function _safeRecoText(s) { return String(s||'').replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); }); }
    function _parseRecoDoc(doc){
      var f=doc.fields||{};
      function _s(x){ if(!x) return ''; return x.stringValue!==undefined?x.stringValue:String(x.integerValue||x.doubleValue||''); }
      function _b(x,d){ return x?x.booleanValue!==false:d!==false; }
      function _a(x){ if(!x||!x.arrayValue)return []; return (x.arrayValue.values||[]).map(function(v){return _s(v);}).filter(Boolean); }
      var id=(doc.name||'').split('/').pop();
      return {id:id,name:_s(f.name||f.nombre),description:_s(f.description||f.descripcion),thumb:_s(f.thumb||f.imagen||f.icon),ver:_s(f.ver||f.version),size:_s(f.size||f.peso),visible:_b(f.visible),features:_a(f.features||f.modFeatures),timestamp:parseInt(_s(f.timestamp)||'0',10)||0,order:parseInt(_s(f.order)||'0',10)||0};
    }
    function _normalizeRecoGame(g){
      return {id:String(g.id||''),name:g.name||g.nombre||'Juego MOD',description:g.description||g.descripcion||'',thumb:g.thumb||g.imagen||g.icon||'',ver:g.ver||g.version||'',size:g.size||g.peso||'',visible:g.visible!==false,features:g.features||g.modFeatures||g.caracteristicas||[],timestamp:g.timestamp||0,order:g.order||0};
    }
    function _shuffleReco(list){
      var seed;
      try{ seed = sessionStorage.getItem('jd_reco_seed') || String(Math.random()).slice(2); sessionStorage.setItem('jd_reco_seed', seed); }catch(e){ seed=String(Math.random()).slice(2); }
      var n=parseInt(seed.slice(0,8),10)||Date.now();
      function rnd(){ n=(n*1664525+1013904223)>>>0; return n/4294967296; }
      var arr=list.slice();
      for(var i=arr.length-1;i>0;i--){ var j=Math.floor(rnd()*(i+1)); var t=arr[i]; arr[i]=arr[j]; arr[j]=t; }
      return arr;
    }
    function _renderRecommended(games){
      var sec=document.getElementById('dl-reco-section');
      var grid=document.getElementById('dl-reco-grid');
      var count=document.getElementById('dl-reco-count');
      if(!sec||!grid) return;
      var list=(games||[]).map(_normalizeRecoGame).filter(function(g){ return g.visible!==false && g.id && String(g.id)!==String(gameId) && g.name; });
      if(!list.length){ sec.classList.remove('visible'); return; }
      list.sort(function(a,b){ return (b.timestamp||0)-(a.timestamp||0) || (a.order||0)-(b.order||0); });
      list=_shuffleReco(list).slice(0,12);
      if(count) count.textContent=list.length+' opciones';
      grid.innerHTML=list.map(function(g){
        var name=_safeRecoText(g.name);
        var meta=_safeRecoText((g.ver?g.ver:'MOD APK')+(g.size?' · '+g.size:''));
        var img=_safeRecoText(g.thumb||'');
        var slug=_slugifyReco(g.name);
        var href='index.html?mod='+encodeURIComponent(slug)+'&id='+encodeURIComponent(g.id);
        return '<a class="dl-reco-card" href="'+href+'">'
          +'<img class="dl-reco-img" src="'+(img||'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=')+'" alt="'+name+'" width="42" height="42" loading="lazy" decoding="async" onerror="this.style.display=\'none\'">'
          +'<div class="dl-reco-info"><span class="dl-reco-name">'+name+'</span><span class="dl-reco-meta">'+meta+'</span><span class="dl-reco-badge">✓ Seguro</span></div>'
          +'</a>';
      }).join('');
      sec.classList.add('visible');
    }
    function _loadRecommended(){
      var gistUrl='https://gist.githubusercontent.com/JoelDroidModsYT/5981d391897fe461dc5ac9ba7303b8f2/raw/games.json?v='+Math.floor(Date.now()/60000);
      fetch(gistUrl,{cache:'no-cache'})
        .then(function(r){ if(!r.ok) throw new Error('gist '+r.status); return r.json(); })
        .then(function(d){ var games=Array.isArray(d)?d:(d.games||[]); if(!games.length) throw new Error('gist vacio'); _renderRecommended(games); })
        .catch(function(){
          var fs='https://firestore.googleapis.com/v1/projects/joeldroid-mods/databases/(default)/documents/mods?orderBy=order&pageSize=80&key='+FB_CFG.apiKey;
          fetch(fs).then(function(r){return r.json();}).then(function(d){ _renderRecommended((d.documents||[]).map(_parseRecoDoc)); }).catch(function(){});
        });
    }
    _loadRecommended();

    /* ═══════════════════════════════════════════════════════════════
       FLUJO SECUENCIAL: activador → verificando (7s) → final
       - 1er clic:  abre Monetag (popunder/direct-link) en nueva pestaña
                    e inicia verificación obligatoria.
       - Verificando: bloqueado 7s (temporizador absoluto anti-freeze).
       - 2do clic (final): redirige a la URL REAL dinámica de Cuty.io
                            leída de Firestore (nunca fija).
    ═══════════════════════════════════════════════════════════════ */
    var btnState = 'idle';          // idle | activador | verificando | final
    var SECURITY_SCAN_SECS = 10;  // 2do temporizador (asimétrico: 10s)

    /* Monetag direct-link opcional; si está vacío, se dispara solo por click
       gracias al script data-zone ya cargado en <head>. */
    var MONETAG_DIRECT_URL = '';    // p.ej. 'https://otieu.com/4/xxxxxx'

    function _labelTop(){ return btnFinal ? btnFinal.querySelector('.dl-btn-label-top') : null; }
    function _sizeBadge(){ return document.getElementById('dl-btn-size-badge'); }

    function _resetBtnExtras(){
      if (!btnFinal) return;
      var mini = btnFinal.querySelector('.dl-btn-mini-timer'); if (mini) mini.remove();
      var bar  = btnFinal.querySelector('.dl-btn-progress');   if (bar)  bar.remove();
    }

    function _renderActivador(){
      if (!btnFinal) return;
      _clearFileScanner();
      btnState = 'activador';
      btnFinal.classList.remove('estado-verificando','estado-final');
      btnFinal.classList.add('estado-activador');
      btnFinal.style.pointerEvents = '';
      var lt = _labelTop(); if (lt) lt.textContent = '👉 ¡HAZ CLIC AQUÍ PARA OBTENER EL ENLACE!';
      var meta = window._jdMeta || {};
      if (btnTexto) btnTexto.innerHTML = _buildBtnHTML(meta.name||'MOD APK', meta.ver||'', meta.feats||[]);
      var bdg = _sizeBadge();
      if (bdg) { bdg.style.display=''; bdg.textContent = meta.size || '—'; }
      _resetBtnExtras();
    }

    function _renderSecurityScan(){
      if (!btnFinal) return;
      _clearFileScanner();
      btnState = 'verificando';
      btnFinal.classList.remove('estado-activador','estado-final');
      btnFinal.classList.add('estado-verificando');
      btnFinal.style.pointerEvents = 'none';

      var meta = window._jdMeta || {};
      var lt = _labelTop();
      if (lt) lt.textContent = '🛡️ Analizando archivo para una descarga segura...';
      if (btnTexto) btnTexto.innerHTML = _buildBtnHTML(meta.name||'MOD APK', meta.ver||'', meta.feats||[]);
      var bdg = _sizeBadge(); if (bdg) bdg.style.display = 'none';

      _resetBtnExtras();
      var mini = document.createElement('span');
      mini.className = 'dl-btn-mini-timer';
      mini.textContent = '[ ' + SECURITY_SCAN_SECS + 's ]';
      btnFinal.appendChild(mini);

      var bar = document.createElement('div');
      bar.className = 'dl-btn-progress';
      bar.innerHTML = '<div class="dl-btn-progress-fill"></div>';
      btnFinal.appendChild(bar);
      var fill = bar.querySelector('.dl-btn-progress-fill');

      // TIEMPO ABSOLUTO (Date.now) → sobrevive a que el navegador móvil
      // pause la pestaña mientras el ad de Monetag está en primer plano.
      securityCheckTs = Date.now() + SECURITY_SCAN_SECS * 1000;

      function _tickFileScanner(){
        var remainMs = securityCheckTs - Date.now();
        var remainS  = Math.ceil(remainMs / 1000);
        var pct = Math.min(1 - remainMs / (SECURITY_SCAN_SECS * 1000), 1) * 100;
        if (pct < 0) pct = 0;
        if (fill) fill.style.width = pct + '%';
        if (remainMs <= 0){
          _clearFileScanner();
          if (mini) mini.textContent = '[ 0s ]';
          _renderVerifiedLink();
          return;
        }
        if (mini) mini.textContent = '[ ' + Math.max(remainS, 1) + 's ]';
        var _lt = _labelTop();
        if (_lt) _lt.textContent = '🛡️ Analizando archivo para una descarga segura... [ ' + Math.max(remainS,1) + 's ]';
      }
      _tickFileScanner();
      // Intervalo corto (250 ms) + rAF para que el catch-up al enfocar sea instantáneo.
      fileScannerIv = setInterval(_tickFileScanner, 250);
      function _raf(){ if (btnState !== 'verificando') return; _tickFileScanner(); fileScannerRaf = requestAnimationFrame(_raf); }
      fileScannerRaf = requestAnimationFrame(_raf);
    }

    function _renderVerifiedLink(){
      if (!btnFinal) return;
      _clearFileScanner();
      btnState = 'final';
      /* Restablece estilo ACTIVO brillante: quita bloqueo/gris de verificación */
      btnFinal.classList.remove('estado-activador','estado-verificando');
      btnFinal.classList.add('estado-final');
      btnFinal.style.pointerEvents = '';
      btnFinal.style.opacity = '';
      btnFinal.style.filter = '';
      btnFinal.style.cursor = 'pointer';

      /* Limpia badge del segundero [ 0s ] y barra de progreso */
      _resetBtnExtras();
      var stale = btnFinal.querySelectorAll('.dl-btn-mini-timer, .dl-btn-progress');
      for (var i=0; i<stale.length; i++){ stale[i].style.display='none'; stale[i].remove(); }

      /* Datos reales dinámicos del juego (nombre, versión, features) */
      var meta = window._jdMeta || {};
      var vc = _cleanVer(meta.ver || '');
      var baseName = _cleanApk(meta.name || 'MOD APK');
      var modLbl = _modTxt(meta.feats || []);
      var titleLine = baseName + (vc ? ' ' + vc : '') + '.Apk';
      var modLine   = 'Mod ' + modLbl;

      /* Encabezado llamativo (reemplaza "Analizando archivo...") */
      var lt = _labelTop();
      if (lt) {
        lt.textContent = '✓ ¡ENLACE VERIFICADO! HAZ CLIC PARA DESCARGAR';
        lt.style.opacity = '1';
      }

      if (btnTexto) {
        btnTexto.innerHTML =
          '<span class="dl-btn-name-line">' + _esc(titleLine) + '</span>' +
          '<span class="dl-btn-mod-line">'  + _esc(modLine)   + '</span>';
      }

      var bdg = _sizeBadge();
      if (bdg) { bdg.style.display=''; bdg.textContent = meta.size || '—'; }
    }

    /* Re-sincroniza el contador al volver a enfocar la pestaña (móvil) */
    function _onFocusResync(){
      if (btnState === 'verificando'){
        var remainMs = securityCheckTs - Date.now();
        if (remainMs <= 0){
          _renderVerifiedLink();
        } else {
          // Fuerza un tick inmediato
          var mini = btnFinal && btnFinal.querySelector('.dl-btn-mini-timer');
          var fill = btnFinal && btnFinal.querySelector('.dl-btn-progress-fill');
          if (mini) mini.textContent = '[ ' + Math.max(Math.ceil(remainMs/1000), 1) + 's ]';
          if (fill) fill.style.width = (Math.min(1 - remainMs/(SECURITY_SCAN_SECS*1000), 1) * 100) + '%';
        }
      } else if (!timerDone && timerRunning){
        _tickServerReady();
      }
    }
    window.addEventListener('focus', _onFocusResync);
    window.addEventListener('pageshow', _onFocusResync);
    document.addEventListener('visibilitychange', function(){
      if (document.visibilityState === 'visible') _onFocusResync();
    });

    /* ────────── CLICKS ────────── */
    if (btnFinal) {
      btnFinal.addEventListener('click', function(e) {
        e.preventDefault();
        if (!timerDone) return;

        if (btnState === 'activador') {
          // 1er clic: dispara Monetag en NUEVA pestaña e inicia verificación.
          // El data-zone de Monetag inyecta popunder al detectar el gesto de click.
          // Si tienes un direct-link, ponlo en MONETAG_DIRECT_URL para forzar apertura.
          try {
            if (MONETAG_DIRECT_URL) {
              window.open(MONETAG_DIRECT_URL, '_blank', 'noopener,noreferrer');
            }
          } catch(_e){}
          _renderSecurityScan();
          return;
        }

        if (btnState === 'final') {
          // 2do clic: redirige a la URL REAL dinámica de Cuty.io del juego (Firestore).
          var url = btnFinal.getAttribute('data-real-url') || realUrl || '';
          if (url && url !== '#') {
            try { window.location.href = url; } catch(_e){ window.open(url, '_self'); }
          }
          return;
        }
        // 'verificando' está bloqueado por pointer-events:none
      });
    }

    /* ────────── ARRANQUE ────────── */
    if (gameId) {
      if (_trySessionStorage()) { _startServerReady(); _fetchFirebase(); }
      else if (typeof firebase !== 'undefined') { _fetchFirebase(); }
      else {
        var _wFb = setInterval(function() {
          if (typeof firebase !== 'undefined') { clearInterval(_wFb); _fetchFirebase(); }
        }, 80);
        setTimeout(function() { clearInterval(_wFb); if (!timerRunning) _startServerReady(); }, 2500);
      }
    } else { _startServerReady(); }

  });
})();
</script>
