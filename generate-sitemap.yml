name: Auto-Generate Sitemap

# Sitemap automático: lee los juegos desde tu Firestore y reescribe sitemap.xml
# Se ejecuta:
#   1) Cada vez que haces push a main
#   2) Cada 6 horas (cron)
#   3) Manualmente desde la pestaña "Actions"
#
# === SETUP (1 sola vez) ===
# 1. Coloca este archivo en:  .github/workflows/generate-sitemap.yml
# 2. En tu repo → Settings → Secrets and variables → Actions, crea estos secretos:
#      FIREBASE_PROJECT_ID   → ej. joeldroidmods
#      FIREBASE_API_KEY      → tu apiKey de Firebase Web
#      FIREBASE_COLLECTION   → nombre de tu colección (ej. "games" o "mods")
# 3. Settings → Actions → General → Workflow permissions = "Read and write"
# 4. Haz un commit cualquiera o ejecuta el workflow manual. ¡Listo!

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas
  workflow_dispatch:

jobs:
  build-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap.xml from Firestore
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          COLLECTION: ${{ secrets.FIREBASE_COLLECTION }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const https = require('https');
          const SITE = 'https://joeldroidmods.com';
          const today = new Date().toISOString().slice(0,10);
          const url = `https://firestore.googleapis.com/v1/projects/${process.env.PROJECT_ID}/databases/(default)/documents/${process.env.COLLECTION}?pageSize=300&key=${process.env.API_KEY}`;
          https.get(url, res => {
            let data=''; res.on('data',c=>data+=c); res.on('end',()=>{
              let docs=[]; try{docs=(JSON.parse(data).documents)||[];}catch(e){}
              const slugs = docs.map(d=>{
                const f=d.fields||{};
                const name=(f.name||f.nombre||{}).stringValue||'';
                return name.trim().replace(/\s+/g,'-');
              }).filter(Boolean);
              const urls = [
                `  <url><loc>${SITE}/</loc><lastmod>${today}</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>`,
                ...slugs.map(s=>`  <url><loc>${SITE}/?mod=${encodeURIComponent(s)}</loc><lastmod>${today}</lastmod><changefreq>weekly</changefreq><priority>0.9</priority></url>`)
              ];
              const xml = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9" xmlns:image="http://www.google.com/schemas/sitemap-image/1.1">\n${urls.join('\n')}\n</urlset>\n`;
              fs.writeFileSync('sitemap.xml', xml);
              console.log(`Sitemap generado con ${slugs.length} juegos.`);
            });
          }).on('error',e=>{console.error(e);process.exit(1);});
          EOF

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "chore: auto-update sitemap [skip ci]"
          git push
